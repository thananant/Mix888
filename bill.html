<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mix888 — ทำบิล</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#2e1b16; --muted:#8a6f66; --line:#ecdcd2; --bg:#faf5ef; --card:#ffffff;
  --accent:#b91c1c; --accent-soft:#fdeaea; --warn:#ba7517; --warn-soft:#faeeda;
  --danger:#7a1f1f; --danger-soft:#f7dede; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
header{background:var(--card);border-bottom:1px solid var(--line);border-top:4px solid var(--accent);padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
header h1{font-size:18px;font-weight:700}
header h1 span{color:var(--accent)}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:8px 18px;border:none;background:none;font:inherit;font-weight:500;color:var(--muted);cursor:pointer;border-radius:var(--radius)}
.tab.active{background:var(--accent);color:#fff}
a.navlink{font-size:13.5px;color:var(--muted);text-decoration:none}
main{max-width:1000px;margin:20px auto;padding:0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.ohead{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ono{font-weight:700}
.oc{color:var(--muted);font-size:13.5px}
.osum{margin-left:auto;font-weight:700;font-size:16px}
button{font:inherit;font-weight:600;padding:9px 18px;border:none;border-radius:8px;cursor:pointer}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:var(--accent-soft);color:var(--accent)}
.btn-g{background:#f1ece6;color:var(--ink)}
button:disabled{opacity:.5;cursor:not-allowed}
.mini{padding:5px 13px;font-size:13px;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:10px}
th{text-align:left;padding:8px 10px;color:var(--muted);font-size:12.5px;font-weight:600;border-bottom:2px solid var(--line)}
td{padding:7px 10px;border-bottom:1px solid var(--line)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.tag{display:inline-block;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:600}
.tag-ok{background:#e1f5ee;color:#0f6e56}
.tag-warn{background:var(--warn-soft);color:var(--warn)}
.tag-bad{background:var(--danger-soft);color:var(--danger)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 22px;border-radius:99px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;z-index:50;max-width:92vw;text-align:center}
#toast.show{opacity:1}
.empty{text-align:center;color:var(--muted);padding:40px 0}
.page{display:none}.page.active{display:block}
.count{font-size:13px;color:var(--muted);font-weight:500}
@media(max-width:640px){header{padding:10px 12px}.tabs{width:100%;margin-left:0}.tab{flex:1;text-align:center}}
</style>
</head>
<body>

<header>
  <h1>🧾 Mix888 <span>· ทำบิล</span></h1>
  <a class="navlink" href="admin.html">หลังบ้าน</a>
  <a class="navlink" href="receive.html">รับสินค้า</a>
  <a class="navlink" href="account.html">บัญชี</a>
  <div class="tabs">
    <button class="tab active" data-page="orders" onclick="showPage('orders')">ออเดอร์รอทำบิล</button>
    <button class="tab" data-page="bills" onclick="showPage('bills')">บิลทั้งหมด</button>
  </div>
</header>

<main>
  <div class="page active" id="page-orders">
    <div id="orders-list"></div>
  </div>
  <div class="page" id="page-bills">
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <input id="b-search" placeholder="ค้นหาเลขบิล / ลูกค้า…" style="flex:1;min-width:200px;font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:8px" oninput="renderBills()">
        <span class="count" id="b-count"></span>
      </div>
      <div style="overflow-x:auto">
      <table>
        <thead><tr><th>เลขบิล</th><th>ลูกค้า</th><th class="num">ยอด</th><th>วันที่</th><th>LINE</th><th>ชำระ</th><th></th></tr></thead>
        <tbody id="b-body"></tbody>
      </table>
      </div>
    </div>
  </div>
</main>

<canvas id="cv" style="display:none"></canvas>
<div id="toast"></div>

<script>
/* ================= ตั้งค่า ================= */
const SUPABASE_URL = 'https://eqbzpgynzgdwvouuzfwt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HqLNQDwR4omYcb7BNUEKIw_vyHCo4N-';
const SHOP_NAME    = 'Mix888';
/* =========================================== */

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const fmt = n => Number(n).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
function showPage(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('active',e.dataset.page===p));
  document.getElementById('page-'+p).classList.add('active');
}

let orders=[], bills=[];

/* ---------- ออเดอร์รอทำบิล ---------- */
async function loadOrders(){
  const {data,error}=await db.from('orders')
    .select(`*, customers(id,code,name,line_group_id,contact_name,phone,billing_address,ship_shop_name,ship_receiver,ship_phone,ship_address),
             order_items(qty,price,amount,products(name,unit))`)
    .eq('status','new').order('created_at',{ascending:true});
  if(error){toast('โหลดออเดอร์ไม่ได้: '+error.message);return;}
  orders=data||[]; renderOrders();
}
function renderOrders(){
  const el=document.getElementById('orders-list');
  if(!orders.length){el.innerHTML='<div class="card empty">ไม่มีออเดอร์ค้างทำบิล 🎉</div>';return;}
  el.innerHTML=orders.map(o=>{
    const d=new Date(o.created_at).toLocaleString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const hasLine=!!o.customers?.line_group_id;
    return `<div class="card">
      <div class="ohead">
        <span class="ono">${esc(o.order_no)}</span>
        <span class="oc">${esc(o.customers?.code)} · ${esc(o.customers?.name)} · ${d}</span>
        <span class="osum">฿${fmt(o.total)}</span>
      </div>
      <table>
        <thead><tr><th>รายการ</th><th class="num">จำนวน</th><th class="num">ราคา</th><th class="num">รวม</th></tr></thead>
        <tbody>${o.order_items.map(it=>`<tr>
          <td>${esc(it.products?.name)}</td>
          <td class="num">${Number(it.qty)} ${esc(it.products?.unit||'')}</td>
          <td class="num">${fmt(it.price)}</td>
          <td class="num">${fmt(it.amount)}</td></tr>`).join('')}
        </tbody>
      </table>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center">
        <button class="btn-p" onclick="makeBill(${o.id},this)">🧾 ออกบิล${hasLine?' + ส่ง LINE':''}</button>
        ${hasLine?'':'<span class="tag tag-warn">ลูกค้ายังไม่ผูกกลุ่ม LINE — บิลจะออกเป็นรูปให้ดาวน์โหลดแทน</span>'}
      </div>
    </div>`;
  }).join('');
}

/* ---------- วาดบิลเป็นรูป ---------- */
function wrapText(ctx,text,maxW){
  if(!text)return[];
  const words=String(text).split(''); // ไทยตัดคำยาก ใช้ตัดตามตัวอักษร
  const lines=[];let cur='';
  for(const ch of words){
    if(ctx.measureText(cur+ch).width>maxW&&cur){lines.push(cur);cur=ch;}
    else cur+=ch;
  }
  if(cur)lines.push(cur);
  return lines;
}
async function drawBill(o,billNo){
  await document.fonts.load('700 30px "IBM Plex Sans Thai"');
  await document.fonts.load('400 20px "IBM Plex Sans Thai"');
  const c=o.customers, items=o.order_items;
  const cv=document.getElementById('cv'), W=800;
  const m=cv.getContext('2d');
  m.font='400 20px "IBM Plex Sans Thai"';

  const billAddrLines=wrapText(m,c.billing_address,440);
  const shipAddrLines=wrapText(m,c.ship_address,440);
  const rowH=34;
  const infoH=140+(billAddrLines.length*26)+70+(shipAddrLines.length*26);
  const H=110+infoH+50+items.length*rowH+130;

  cv.width=W; cv.height=H;
  const x=cv.getContext('2d');
  x.fillStyle='#ffffff';x.fillRect(0,0,W,H);

  // แถบหัวแดง
  x.fillStyle='#b91c1c';x.fillRect(0,0,W,86);
  x.fillStyle='#ffffff';
  x.font='700 32px "IBM Plex Sans Thai"';
  x.fillText('🔥 '+SHOP_NAME,32,54);
  x.font='500 20px "IBM Plex Sans Thai"';
  x.textAlign='right';
  x.fillText('ใบส่งของ / ใบเรียกเก็บเงิน',W-32,54);
  x.textAlign='left';

  let y=120;
  x.fillStyle='#2e1b16';
  // ฝั่งขวา: เลขบิล วันที่
  x.textAlign='right';
  x.font='700 22px "IBM Plex Sans Thai"';
  x.fillText('เลขที่ '+billNo,W-32,y);
  x.font='400 18px "IBM Plex Sans Thai"';
  x.fillStyle='#8a6f66';
  x.fillText(new Date().toLocaleString('th-TH',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}),W-32,y+28);
  x.textAlign='left';

  // ข้อมูลลูกค้า (บิล)
  x.fillStyle='#b91c1c';x.font='700 19px "IBM Plex Sans Thai"';
  x.fillText('ลูกค้า',32,y);y+=28;
  x.fillStyle='#2e1b16';x.font='600 21px "IBM Plex Sans Thai"';
  x.fillText(c.name+'  ('+c.code+')',32,y);y+=27;
  x.font='400 19px "IBM Plex Sans Thai"';x.fillStyle='#5c4a42';
  if(c.contact_name||c.phone){x.fillText((c.contact_name||'')+(c.phone?'  โทร '+c.phone:''),32,y);y+=26;}
  for(const l of billAddrLines){x.fillText(l,32,y);y+=26;}

  y+=14;
  // ข้อมูลจัดส่ง
  x.fillStyle='#b91c1c';x.font='700 19px "IBM Plex Sans Thai"';
  x.fillText('จัดส่งที่',32,y);y+=28;
  x.fillStyle='#2e1b16';x.font='400 19px "IBM Plex Sans Thai"';
  const shipHead=(c.ship_shop_name||c.name)+((c.ship_receiver)?'  ผู้รับ: '+c.ship_receiver:'')+(c.ship_phone?'  โทร '+c.ship_phone:'');
  x.fillText(shipHead,32,y);y+=26;
  x.fillStyle='#5c4a42';
  for(const l of shipAddrLines){x.fillText(l,32,y);y+=26;}

  y+=16;
  // หัวตาราง
  x.fillStyle='#faf0ea';x.fillRect(24,y-6,W-48,36);
  x.fillStyle='#8a6f66';x.font='600 17px "IBM Plex Sans Thai"';
  x.fillText('รายการ',36,y+18);
  x.textAlign='right';
  x.fillText('จำนวน',555,y+18);
  x.fillText('ราคา/หน่วย',655,y+18);
  x.fillText('รวม',W-36,y+18);
  x.textAlign='left';
  y+=44;

  // รายการ
  x.font='400 19px "IBM Plex Sans Thai"';
  for(const it of items){
    x.fillStyle='#2e1b16';
    let nm=it.products?.name||'';
    if(x.measureText(nm).width>440)nm=nm.slice(0,32)+'…';
    x.fillText(nm,36,y);
    x.textAlign='right';
    x.fillText(Number(it.qty)+' '+(it.products?.unit||''),555,y);
    x.fillText(fmt(it.price),655,y);
    x.font='600 19px "IBM Plex Sans Thai"';
    x.fillText(fmt(it.amount),W-36,y);
    x.font='400 19px "IBM Plex Sans Thai"';
    x.textAlign='left';
    x.strokeStyle='#f0e6de';x.beginPath();x.moveTo(24,y+10);x.lineTo(W-24,y+10);x.stroke();
    y+=rowH;
  }

  // ยอดรวม
  y+=14;
  x.fillStyle='#b91c1c';x.fillRect(24,y-8,W-48,52);
  x.fillStyle='#ffffff';x.font='700 22px "IBM Plex Sans Thai"';
  x.fillText('รวมทั้งสิ้น',36,y+26);
  x.textAlign='right';x.font='700 28px "IBM Plex Sans Thai"';
  x.fillText('฿'+fmt(o.total),W-36,y+28);
  x.textAlign='left';

  y+=76;
  x.fillStyle='#8a6f66';x.font='400 17px "IBM Plex Sans Thai"';
  x.fillText('ขอบคุณที่ใช้บริการครับ 🙏  ·  อ้างอิงออเดอร์ '+o.order_no,32,y);

  return cv;
}

/* ---------- ออกบิล + ส่ง LINE ---------- */
async function nextBillNo(){
  const ymd=new Date(Date.now()+7*3600*1000).toISOString().slice(2,10).replace(/-/g,'');
  const prefix='IV'+ymd;
  const {data}=await db.from('bills').select('bill_no').like('bill_no',prefix+'%')
    .order('bill_no',{ascending:false}).limit(1);
  let n=1;
  if(data&&data.length){const last=parseInt(data[0].bill_no.slice(prefix.length),10);if(!isNaN(last))n=last+1;}
  return prefix+String(n).padStart(4,'0');
}
async function makeBill(orderId,btn){
  const o=orders.find(x=>x.id===orderId);if(!o)return;
  btn.disabled=true;btn.textContent='กำลังออกบิล…';
  try{
    const billNo=await nextBillNo();
    const cv=await drawBill(o,billNo);
    const blob=await new Promise(res=>cv.toBlob(res,'image/png'));

    // อัพรูปขึ้น Storage
    const path=billNo+'.png';
    const {error:upErr}=await db.storage.from('bills').upload(path,blob,{contentType:'image/png',upsert:true});
    if(upErr)throw new Error('อัพรูปไม่สำเร็จ: '+upErr.message);
    const {data:pub}=db.storage.from('bills').getPublicUrl(path);
    const imageUrl=pub.publicUrl;

    // บันทึกบิล + ปิดออเดอร์
    const {error:insErr}=await db.from('bills').insert({
      bill_no:billNo,order_id:o.id,customer_id:o.customers.id,
      total:o.total,image_url:imageUrl,line_sent:false});
    if(insErr)throw new Error('บันทึกบิลไม่สำเร็จ: '+insErr.message);
    await db.from('orders').update({status:'billed'}).eq('id',o.id);

    // ส่งเข้า LINE ถ้าผูกกลุ่มไว้
    if(o.customers.line_group_id){
      const {data:res,error:fnErr}=await db.functions.invoke('line-push',{body:{
        to:o.customers.line_group_id,
        messages:[
          {type:'image',originalContentUrl:imageUrl,previewImageUrl:imageUrl},
          {type:'text',text:'🧾 บิลเลขที่ '+billNo+'\nยอดรวม ฿'+fmt(o.total)+'\nขอบคุณที่สั่งสินค้าครับ'}
        ]}});
      if(fnErr||!res||res.status!==200){
        toast('ออกบิล '+billNo+' แล้ว แต่ส่ง LINE ไม่สำเร็จ — กดส่งซ้ำได้ในแท็บบิลทั้งหมด');
      }else{
        await db.from('bills').update({line_sent:true}).eq('bill_no',billNo);
        toast('ออกบิล '+billNo+' และส่งเข้ากลุ่ม LINE แล้ว ✓');
      }
    }else{
      window.open(imageUrl,'_blank');
      toast('ออกบิล '+billNo+' แล้ว (เปิดรูปให้ในแท็บใหม่)');
    }
    await loadOrders(); await loadBills();
  }catch(e){
    toast(String(e.message||e));
    btn.disabled=false;btn.textContent='🧾 ออกบิล';
  }
}

/* ---------- บิลทั้งหมด ---------- */
async function loadBills(){
  const {data,error}=await db.from('bills')
    .select('*, customers(code,name,line_group_id)')
    .order('created_at',{ascending:false}).limit(200);
  if(error){toast('โหลดบิลไม่ได้: '+error.message);return;}
  bills=data||[]; renderBills();
}
function renderBills(){
  const q=(document.getElementById('b-search').value||'').toLowerCase();
  const list=bills.filter(b=>!q||b.bill_no.toLowerCase().includes(q)||(b.customers?.name||'').toLowerCase().includes(q));
  document.getElementById('b-count').textContent=list.length+' บิล';
  document.getElementById('b-body').innerHTML=list.map(b=>{
    const d=new Date(b.created_at).toLocaleString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    return `<tr>
      <td><b>${esc(b.bill_no)}</b></td>
      <td>${esc(b.customers?.code)} · ${esc(b.customers?.name)}</td>
      <td class="num">${fmt(b.total)}</td>
      <td style="font-size:13px;color:var(--muted)">${d}</td>
      <td>${b.line_sent?'<span class="tag tag-ok">ส่งแล้ว</span>':'<span class="tag tag-warn">ยังไม่ส่ง</span>'}</td>
      <td>${b.payment_status==='paid'?'<span class="tag tag-ok">จ่ายแล้ว</span>':'<span class="tag tag-bad">ค้างจ่าย</span>'}</td>
      <td style="white-space:nowrap">
        <button class="btn-g mini" onclick="window.open('${b.image_url}','_blank')">ดูรูป</button>
        ${b.customers?.line_group_id?`<button class="btn-s mini" onclick="resendBill(${b.id},this)">ส่ง LINE ซ้ำ</button>`:''}
      </td></tr>`;
  }).join('');
}
async function resendBill(id,btn){
  const b=bills.find(x=>x.id===id);if(!b)return;
  btn.disabled=true;
  const {data:res,error}=await db.functions.invoke('line-push',{body:{
    to:b.customers.line_group_id,
    messages:[
      {type:'image',originalContentUrl:b.image_url,previewImageUrl:b.image_url},
      {type:'text',text:'🧾 บิลเลขที่ '+b.bill_no+'\nยอดรวม ฿'+fmt(b.total)}
    ]}});
  btn.disabled=false;
  if(error||!res||res.status!==200){toast('ส่งไม่สำเร็จ: '+(error?.message||JSON.stringify(res)));return;}
  await db.from('bills').update({line_sent:true}).eq('id',id);
  toast('ส่งบิล '+b.bill_no+' เข้ากลุ่มแล้ว ✓');
  loadBills();
}

/* ---------- เริ่มต้น ---------- */
(async()=>{ await loadOrders(); await loadBills(); })();
</script>
</body>
</html>
