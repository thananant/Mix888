<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mix Fresh 168 — สั่งสินค้า</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#3d2b28; --muted:#9a857f; --line:#efe6e0; --bg:#faf6f2; --card:#ffffff;
  --accent:#c0201f; --accent-soft:#fce8e6; --accent-deep:#9e1414;
  --warn:#c47d2a; --warn-soft:#fbf0dd; --danger:#b52020; --danger-soft:#fae0de;
  --ok:#159b78; --ok-soft:#ddf4ee; --radius:18px;
  --display:'Mali','IBM Plex Sans Thai',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:90px}
header{background:linear-gradient(135deg,#9e1414,#c0201f);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10;box-shadow:0 3px 14px rgba(158,20,20,.18)}
header h1{font-size:17px;font-weight:700;font-family:var(--display)}
header h1 span{color:#ffd0cc;font-weight:500}
.cust{font-size:13px;color:rgba(255,255,255,.88);margin-top:2px}
main{max-width:640px;margin:0 auto;padding:12px}
.searchbox{width:100%;font:inherit;padding:12px 16px;border:1.5px solid var(--line);border-radius:99px;background:var(--card);margin-bottom:10px}
.searchbox:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.item{background:var(--card);border:1px solid #fbeef0;border-radius:var(--radius);padding:12px 14px;margin-bottom:9px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(217,74,106,.05)}
.item.out{opacity:.55}
.info{flex:1;min-width:0}
.name{font-weight:600;line-height:1.35}
.pack{font-size:12.5px;color:var(--muted)}
.price{font-size:14px;color:var(--accent);font-weight:700;margin-top:2px}
.price small{color:var(--muted);font-weight:400}
.stock{font-size:12px;margin-top:2px}
.stock.ok{color:var(--ok)}
.stock.low{color:var(--warn);font-weight:600}
.stock.zero{color:var(--danger);font-weight:700}
.qtybox{display:flex;align-items:center;gap:6px}
.qbtn{width:38px;height:38px;border:none;border-radius:12px;background:var(--accent-soft);color:var(--accent);font-size:20px;font-weight:700;cursor:pointer;flex-shrink:0}
.qbtn:disabled{opacity:.35}
.qin{width:52px;height:38px;text-align:center;font:inherit;font-weight:700;border:1.5px solid var(--line);border-radius:12px;background:#fff}
.qin:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
#cartbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:20;box-shadow:0 -4px 18px rgba(217,74,106,.1)}
#cartbar .sum{flex:1}
#cartbar .n{font-size:13px;color:var(--muted)}
#cartbar .t{font-size:18px;font-weight:700;font-family:var(--display)}
.btn{font:inherit;font-weight:700;padding:13px 26px;border:none;border-radius:99px;cursor:pointer}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(209,77,106,.26)}
.btn-p:disabled{opacity:.4}
.btn-g{background:#f1ece6;color:var(--ink)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:30;display:none;align-items:flex-end;justify-content:center}
#overlay.show{display:flex}
.sheet{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:640px;max-height:85vh;overflow-y:auto;padding:20px 16px 24px}
.sheet h2{font-size:17px;font-weight:700;margin-bottom:12px}
.cline{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.cline .cn{flex:1}
.cline .cq{color:var(--muted);white-space:nowrap}
.cline .ca{font-weight:600;white-space:nowrap}
.total-line{display:flex;justify-content:space-between;padding:14px 0;font-size:17px;font-weight:700}
#success{position:fixed;inset:0;background:var(--bg);z-index:40;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
#success.show{display:flex}
.bigcheck{width:88px;height:88px;border-radius:50%;background:#e1f5ee;color:#0f6e56;font-size:44px;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
#success h2{font-size:20px;margin-bottom:6px;font-family:var(--display)}
#success .ono{font-size:15px;color:var(--muted);margin-bottom:4px}
#success .ot{font-size:26px;font-weight:700;color:var(--accent);margin-bottom:24px;font-family:var(--display)}
.tabbar{display:flex;gap:8px;margin-bottom:14px}
.ctab{flex:1;font:inherit;font-weight:600;padding:11px;border:none;border-radius:99px;background:var(--card);color:var(--muted);cursor:pointer;border:1.5px solid var(--line)}
.ctab.active{background:var(--accent);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(209,77,106,.24)}
.datefilter{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:12px}
.qbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.qb{font:inherit;font-size:13px;font-weight:600;padding:6px 15px;border:none;border-radius:99px;background:#f6ece8;color:var(--muted);cursor:pointer}
.qb.active{background:var(--accent);color:#fff}
.drow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:13px;color:var(--muted)}
.drow input{font:inherit;padding:7px 10px;border:1px solid var(--line);border-radius:8px}
.hsum{font-size:13.5px;color:var(--muted);margin-bottom:10px;padding:0 4px}
.ocard{background:var(--card);border:1px solid #fbeef0;border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(217,74,106,.05)}
.ocard .oh{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px}
.ocard .ono{font-weight:700;font-size:15px}
.ocard .od{font-size:12.5px;color:var(--muted)}
.ocard .oa{font-weight:700;font-size:16px;white-space:nowrap}
.oitems{font-size:13px;color:#5c4a42;margin:8px 0;padding:8px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.oitems div{display:flex;justify-content:space-between;padding:2px 0}
.statusrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:8px 0 4px}
.statusbadge{color:#fff;font-size:12.5px;font-weight:600;padding:3px 12px;border-radius:99px}
.paytag{font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px}
.paytag.paid{background:#e1f5ee;color:#0f6e56}
.paytag.unpaid{background:var(--warn-soft);color:var(--warn)}
.steps{display:flex;gap:0;margin-top:10px}
.step{flex:1;text-align:center;position:relative;font-size:11px;color:#c3b4ab}
.step::before{content:'';position:absolute;top:11px;left:-50%;width:100%;height:2px;background:#eee;z-index:0}
.step:first-child::before{display:none}
.step .dot{width:24px;height:24px;border-radius:50%;background:#eee;color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;font-size:12px;position:relative;z-index:1}
.step.done{color:var(--ok);font-weight:600}
.step.done .dot{background:var(--ok)}
.step.done::before{background:var(--ok)}
.step.wait .dot{background:#e0d5cc}
.hist{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-top:16px}
.hist h3{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--muted)}
.hline{display:flex;justify-content:space-between;font-size:13.5px;padding:6px 0;border-bottom:1px solid var(--line)}
.hline:last-child{border-bottom:none}
.tag{display:inline-block;padding:1px 9px;border-radius:99px;font-size:11.5px;font-weight:600}
.tag-new{background:var(--warn-soft);color:var(--warn)}
.tag-billed{background:#e1f5ee;color:#0f6e56}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:99px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;z-index:50;max-width:92vw;text-align:center}
#toast.show{opacity:1}
#errpage{display:none;text-align:center;padding:60px 24px}
#errpage.show{display:block}
.empty{text-align:center;color:var(--muted);padding:40px 0}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <img src="logo.png" alt="Mix Fresh 168" style="width:44px;height:44px;object-fit:cover;border-radius:13px;flex-shrink:0;border:2px solid rgba(255,255,255,.6);box-shadow:0 2px 8px rgba(0,0,0,.15)">
    <h1 style="margin:0">Mix Fresh 168 <span>· สั่งสินค้า</span></h1>
  </div>
  <div class="cust" id="cust-name">กำลังโหลด…</div>
</header>

<main>
  <div id="errpage">
    <div style="font-size:44px;margin-bottom:12px">🔒</div>
    <h2 style="margin-bottom:8px">เปิดหน้านี้ไม่ได้</h2>
    <p id="errmsg" style="color:var(--muted)"></p>
  </div>

  <div id="shop" style="display:none">
    <div class="tabbar">
      <button class="ctab active" id="tab-order" onclick="showTab('order')">🛒 สั่งของ</button>
      <button class="ctab" id="tab-history" onclick="showTab('history')">📋 ประวัติการสั่ง</button>
    </div>

    <div id="page-order">
      <input class="searchbox" id="search" placeholder="🔍 ค้นหาสินค้า…" oninput="render()">
      <div id="list"></div>
    </div>

    <div id="page-history" style="display:none">
      <div class="datefilter">
        <div class="qbtns">
          <button class="qb" onclick="histRange('7')">7 วัน</button>
          <button class="qb active" onclick="histRange('30')">30 วัน</button>
          <button class="qb" onclick="histRange('90')">90 วัน</button>
          <button class="qb" onclick="histRange('all')">ทั้งหมด</button>
        </div>
        <div class="drow">
          <label>จาก</label><input type="date" id="h-from" onchange="renderHistory()">
          <label>ถึง</label><input type="date" id="h-to" onchange="renderHistory()">
        </div>
      </div>
      <div id="hist-summary" class="hsum"></div>
      <div id="hist-body"></div>
    </div>
  </div>
</main>

<div id="cartbar" style="display:none">
  <div class="sum">
    <div class="n" id="cart-n">ยังไม่ได้เลือกสินค้า</div>
    <div class="t" id="cart-t">฿0.00</div>
  </div>
  <button class="btn btn-p" id="order-btn" onclick="openConfirm()" disabled>สั่งสินค้า</button>
</div>

<div id="overlay" onclick="if(event.target===this)closeConfirm()">
  <div class="sheet">
    <h2>ยืนยันการสั่งสินค้า</h2>
    <div id="confirm-list"></div>
    <div class="total-line"><span>รวมทั้งหมด</span><span id="confirm-total"></span></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-g" style="flex:1" onclick="closeConfirm()">กลับไปแก้</button>
      <button class="btn btn-p" style="flex:2" id="confirm-btn" onclick="placeOrder()">✓ ยืนยันสั่งสินค้า</button>
    </div>
  </div>
</div>

<div id="success">
  <div class="bigcheck">✓</div>
  <h2>สั่งสินค้าเรียบร้อย</h2>
  <div class="ono" id="s-no"></div>
  <div class="ot" id="s-total"></div>
  <button class="btn btn-p" onclick="backToShop()">สั่งสินค้าเพิ่ม</button>
</div>

<div id="toast"></div>

<script>
/* ================= ตั้งค่า ================= */
const SUPABASE_URL = 'https://eqbzpgynzgdwvouuzfwt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HqLNQDwR4omYcb7BNUEKIw_vyHCo4N-';
/* =========================================== */

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const fmt = n => '฿'+Number(n).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

let customer=null, items=[], cart={};
const token=new URLSearchParams(location.search).get('t');

function showError(msg){
  document.getElementById('errpage').classList.add('show');
  document.getElementById('errmsg').textContent=msg;
  document.getElementById('cust-name').textContent='—';
}

async function init(){
  if(!token){showError('ลิงก์ไม่ครบถ้วน กรุณาใช้ลิงก์ที่ทางร้านส่งให้ในกลุ่ม LINE');return;}
  const {data,error}=await db.from('customers')
    .select('id,code,name,line_group_id,sale_name,contact_name,phone,billing_address,map_link,receive_time,note,delivery_method,ship_shop_name,ship_receiver,ship_phone,ship_address')
    .eq('order_token',token).eq('active',true).maybeSingle();
  if(error||!data){showError('ลิงก์ไม่ถูกต้องหรือถูกยกเลิกแล้ว กรุณาติดต่อทางร้าน');return;}
  customer=data;
  document.getElementById('cust-name').textContent=customer.name+' ('+customer.code+')';
  document.getElementById('shop').style.display='';
  document.getElementById('cartbar').style.display='flex';
  await loadCatalog();
  subscribeStock();
}

async function loadCatalog(){
  const {data,error}=await db.from('v_customer_catalog')
    .select('*').eq('customer_id',customer.id).order('sku');
  if(error){toast('โหลดสินค้าไม่ได้: '+error.message);return;}
  items=data||[];
  for(const it of items){
    if(cart[it.product_id]>it.stock_qty) cart[it.product_id]=Math.max(0,Math.floor(it.stock_qty));
  }
  render();
}

function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const list=items.filter(it=>!q||it.name.toLowerCase().includes(q)||it.sku.toLowerCase().includes(q));
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<div class="empty">ยังไม่มีสินค้าในรายการของคุณ<br>กรุณาติดต่อทางร้าน</div>';updateCartBar();return;}
  if(!list.length){el.innerHTML='<div class="empty">ไม่พบสินค้าที่ค้นหา</div>';updateCartBar();return;}
  el.innerHTML=list.map(it=>{
    const stock=Number(it.stock_qty);
    const qty=cart[it.product_id]||0;
    const out=stock<=0;
    let stockHtml = out ? '<span class="stock zero">สินค้าหมด</span>'
      : stock<=10 ? `<span class="stock low">เหลือ ${stock} ${esc(it.unit)}</span>`
      : `<span class="stock ok">เหลือ ${stock} ${esc(it.unit)}</span>`;
    return `<div class="item ${out?'out':''}">
      <div class="info">
        <div class="name">${esc(it.name)}</div>
        ${it.pack_info?`<div class="pack">${esc(it.pack_info)}</div>`:''}
        <div class="price">${fmt(it.price)} <small>/ ${esc(it.unit)}</small></div>
        ${stockHtml}
      </div>
      <div class="qtybox">
        <button class="qbtn" onclick="step(${it.product_id},-1)" ${out||qty<=0?'disabled':''}>−</button>
        <input class="qin" inputmode="numeric" value="${qty||''}" placeholder="0" ${out?'disabled':''}
          onchange="setQty(${it.product_id},this.value)">
        <button class="qbtn" onclick="step(${it.product_id},1)" ${out||qty>=stock?'disabled':''}>＋</button>
      </div>
    </div>`;
  }).join('');
  updateCartBar();
}

function step(pid,d){
  const it=items.find(x=>x.product_id===pid);if(!it)return;
  let q=(cart[pid]||0)+d;
  q=Math.max(0,Math.min(q,Math.floor(it.stock_qty)));
  cart[pid]=q; render();
}
function setQty(pid,val){
  const it=items.find(x=>x.product_id===pid);if(!it)return;
  let q=parseInt(String(val).replace(/\D/g,''),10)||0;
  const max=Math.floor(it.stock_qty);
  if(q>max){q=max;toast('สินค้านี้เหลือ '+max+' '+it.unit);}
  cart[pid]=q; render();
}

function cartItems(){
  return Object.entries(cart).filter(([,q])=>q>0).map(([pid,q])=>{
    const it=items.find(x=>x.product_id===Number(pid));
    return it?{...it,qty:q,amount:q*Number(it.price)}:null;
  }).filter(Boolean);
}
function updateCartBar(){
  const ci=cartItems();
  const total=ci.reduce((s,x)=>s+x.amount,0);
  const n=ci.reduce((s,x)=>s+x.qty,0);
  document.getElementById('cart-n').textContent=ci.length?ci.length+' รายการ · '+n+' ชิ้น':'ยังไม่ได้เลือกสินค้า';
  document.getElementById('cart-t').textContent=fmt(total);
  document.getElementById('order-btn').disabled=!ci.length;
}

function openConfirm(){
  const ci=cartItems();if(!ci.length)return;
  document.getElementById('confirm-list').innerHTML=ci.map(x=>`
    <div class="cline">
      <span class="cn">${esc(x.name)}</span>
      <span class="cq">${x.qty} ${esc(x.unit)} × ${fmt(x.price)}</span>
      <span class="ca">${fmt(x.amount)}</span>
    </div>`).join('');
  document.getElementById('confirm-total').textContent=fmt(ci.reduce((s,x)=>s+x.amount,0));
  document.getElementById('overlay').classList.add('show');
}
function closeConfirm(){document.getElementById('overlay').classList.remove('show');}

async function placeOrder(){
  const ci=cartItems();if(!ci.length)return;
  const btn=document.getElementById('confirm-btn');
  btn.disabled=true;btn.textContent='กำลังส่งออเดอร์…';
  const {data,error}=await db.rpc('place_order',{
    p_customer_id:customer.id,
    p_items:ci.map(x=>({product_id:x.product_id,qty:x.qty}))
  });
  btn.disabled=false;btn.textContent='✓ ยืนยันสั่งสินค้า';
  if(error){
    closeConfirm();
    if(error.message.includes('OUT_OF_STOCK')){
      const p=error.message.split('|');
      toast('ขออภัย "'+(p[1]||'สินค้า')+'" '+(p[2]||'ของไม่พอ')+' กรุณาปรับจำนวน');
      await loadCatalog();
    } else if(error.message.includes('NOT_ALLOWED')){
      toast('มีสินค้าที่ไม่อยู่ในรายการของคุณ กรุณารีเฟรชหน้า');
      await loadCatalog();
    } else toast('สั่งไม่สำเร็จ: '+error.message);
    return;
  }
  closeConfirm();
  cart={};
  document.getElementById('s-no').textContent='เลขที่ออเดอร์ '+data.order_no;
  document.getElementById('s-total').textContent=fmt(data.total);
  document.getElementById('success').classList.add('show');
  notifyCentral(data,ci);
  notifyCustomerOrder(data,ci);
  loadCatalog();
  allOrders=[]; // ให้โหลดใหม่เมื่อเปิดแท็บประวัติ
}
// แจ้งกลุ่ม LINE ของลูกค้าเองว่ารับออเดอร์แล้ว
async function notifyCustomerOrder(data,ci){
  try{
    const gid=customer.line_group_id;if(!gid)return;
    let t='✅ รับออเดอร์ '+data.order_no+' เรียบร้อยแล้ว\nสถานะ: กำลังดำเนินการ กำลังจัดเตรียมสินค้า\n──────────\nรายการ :';
    ci.forEach(x=>{t+='\n'+x.name+' '+x.qty+' '+(x.unit||'');});
    t+='\nรวม ฿'+fmt(data.total)+'\n\nขอบคุณที่สั่งสินค้าครับ 🙏';
    await db.functions.invoke('line-push',{body:{to:gid,messages:[{type:'text',text:t}]}});
  }catch(e){/* เงียบไว้ */}
}
async function notifyCentral(data,ci){
  try{
    const {data:st}=await db.from('settings').select('value').eq('key','line_central_group').maybeSingle();
    const gid=st&&st.value;if(!gid)return;
    const c=customer;
    let t='🆕 ออเดอร์ใหม่ '+data.order_no+'\n';
    if(c.sale_name)t+='Sale : '+c.sale_name+'\n';
    t+='ร้าน : '+c.name+' ('+c.code+')\n';
    t+='ผู้รับ : '+(c.ship_receiver||c.contact_name||'-');
    const ph=c.ship_phone||c.phone;if(ph)t+='  โทร '+ph;
    t+='\nวิธีส่ง : '+(c.delivery_method||'-');
    if(c.receive_time)t+='\nเวลารับของ : '+c.receive_time;
    if(c.map_link)t+='\nMap : '+c.map_link;
    const addr=c.ship_address||c.billing_address;if(addr)t+='\nที่อยู่ : '+addr;
    t+='\n──────────\nรายการ :';
    ci.forEach(x=>{t+='\n'+x.name+' '+x.qty+' '+(x.unit||'');});
    t+='\nรวม ฿'+fmt(data.total);
    if(c.note)t+='\nหมายเหตุ : '+c.note;
    await db.functions.invoke('line-push',{body:{to:gid,messages:[{type:'text',text:t}]}});
  }catch(e){/* เงียบไว้ ไม่รบกวนลูกค้า */}
}
function backToShop(){
  document.getElementById('success').classList.remove('show');
  window.scrollTo(0,0);
}

let allOrders=[];
function showTab(t){
  document.getElementById('tab-order').classList.toggle('active',t==='order');
  document.getElementById('tab-history').classList.toggle('active',t==='history');
  document.getElementById('page-order').style.display=t==='order'?'':'none';
  document.getElementById('page-history').style.display=t==='history'?'':'none';
  document.getElementById('cartbar').style.display=t==='order'?'flex':'none';
  if(t==='history') loadHistory();
}
function histRange(r){
  document.querySelectorAll('.qb').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  const to=new Date(), from=new Date();
  const fmtd=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  document.getElementById('h-to').value=fmtd(to);
  if(r==='all'){document.getElementById('h-from').value='';document.getElementById('h-to').value='';}
  else{from.setDate(to.getDate()-Number(r));document.getElementById('h-from').value=fmtd(from);}
  renderHistory();
}
async function loadHistory(){
  const {data,error}=await db.from('orders')
    .select('id,order_no,total,status,created_at, bills(bill_no,ship_status,payment_status,line_sent)')
    .eq('customer_id',customer.id).order('created_at',{ascending:false}).limit(500);
  if(error){console.warn(error);return;}
  allOrders=data||[];
  if(!document.getElementById('h-from').value && !document.getElementById('h-to').value){
    // ตั้งค่าเริ่มต้น 30 วัน
    const to=new Date(), from=new Date();from.setDate(to.getDate()-30);
    const fmtd=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    document.getElementById('h-from').value=fmtd(from);
    document.getElementById('h-to').value=fmtd(to);
  }
  renderHistory();
}
function orderSteps(o){
  const bill=(o.bills&&o.bills[0])||null;
  const cancelled=o.status==='cancelled'||(bill&&bill.ship_status==='cancelled');
  const billed=!!bill;
  const shipped=bill&&bill.ship_status==='shipped';
  const paid=bill&&bill.payment_status==='paid';
  return {cancelled,ordered:true,billed,shipped,paid};
}
function renderHistory(){
  const from=document.getElementById('h-from').value;
  const to=document.getElementById('h-to').value;
  let list=allOrders.filter(o=>{
    if(from&&new Date(o.created_at)<new Date(from+'T00:00:00'))return false;
    if(to&&new Date(o.created_at)>new Date(to+'T23:59:59'))return false;
    return true;
  });
  const total=list.reduce((s,o)=>s+Number(o.total),0);
  document.getElementById('hist-summary').textContent=list.length+' ออเดอร์ · รวม ฿'+fmt(total);
  const body=document.getElementById('hist-body');
  if(!list.length){body.innerHTML='<div class="empty">ไม่มีออเดอร์ในช่วงนี้</div>';return;}
  body.innerHTML=list.map(o=>{
    const d=new Date(o.created_at).toLocaleString('th-TH',{day:'numeric',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    const s=orderSteps(o);
    const bill=(o.bills&&o.bills[0])||null;
    if(s.cancelled){
      return `<div class="ocard" style="opacity:.65">
        <div class="oh"><div><div class="ono">${esc(o.order_no)}</div><div class="od">${d}</div></div>
          <div class="oa">฿${fmt(o.total)}<br><span class="tag tag-new" style="background:var(--danger-soft);color:var(--danger)">ยกเลิกแล้ว</span></div></div></div>`;
    }
    const step=(label,done,icon)=>`<div class="step ${done?'done':'wait'}"><div class="dot">${done?'✓':icon}</div>${label}</div>`;
    // ป้ายสถานะล่าสุด (เป็นคำ)
    let statusLabel,statusColor;
    if(s.paid){statusLabel='รับชำระแล้ว';statusColor='var(--ok)';}
    else if(s.shipped){statusLabel='จัดส่งแล้ว';statusColor='#0f6e56';}
    else if(s.billed){statusLabel='ออกบิลแล้ว · รอจัดส่ง';statusColor='#b8860b';}
    else{statusLabel='รับออเดอร์ · กำลังเตรียมของ';statusColor='var(--muted)';}
    // สถานะเงิน (แสดงเมื่อออกบิลแล้ว)
    const payTag = s.billed
      ? (s.paid?'<span class="paytag paid">💰 จ่ายแล้ว</span>':'<span class="paytag unpaid">⏳ ค้างจ่าย</span>')
      : '';
    return `<div class="ocard">
      <div class="oh">
        <div><div class="ono">${esc(o.order_no)}</div><div class="od">${d}${bill?' · บิล '+esc(bill.bill_no):''}</div></div>
        <div class="oa">฿${fmt(o.total)}</div>
      </div>
      <div class="statusrow"><span class="statusbadge" style="background:${statusColor}">${statusLabel}</span>${payTag}</div>
      <div class="steps">
        ${step('รับออเดอร์',s.ordered,'1')}
        ${step('ออกบิล',s.billed,'2')}
        ${step('รอจัดส่ง',s.shipped,'3')}
        ${step('รับชำระ',s.paid,'4')}
      </div>
    </div>`;
  }).join('');
}

function subscribeStock(){
  db.channel('stock-live')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'products'},payload=>{
      const it=items.find(x=>x.product_id===payload.new.id);
      if(it){
        it.stock_qty=payload.new.stock_qty;
        if(cart[it.product_id]>it.stock_qty) cart[it.product_id]=Math.max(0,Math.floor(it.stock_qty));
        render();
      }
    }).subscribe();
}

init();
